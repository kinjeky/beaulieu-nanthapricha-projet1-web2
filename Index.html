<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ranchers&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ranchers&display=swap" rel="stylesheet">
</head>
<body>
    <!-- header de la page -->
    <header class="header">
        <!-- Logo dans le header -->
        <div class="header__brand">
            <img class="header__brandimage" src="" alt="">
            <div class="header__brandname">Thé Bulles</div>
        </div>

        <!-- Les hyperliens dans le header-->
        <nav class="header__nav">
            <a href="#" class="header__navlink">Accueil</a>
            <a href="#" class="header__navlink">À propos</a>
            <a href="#" class="header__navlink">Nos services</a>
            <a href="#" class="header__navlink">Activités</a>
            <a href="#" class="header__navlink">Témoignages</a>
            <a href="#" class="header__navlink">Nous joindre</a>
        </nav>
        
        <button class="header__button">
            <p class="header__buttontext">Commander</p>
        </button>
    </header>

    <!-- Section hero banner-->
    <section class="hero">
        <container class="hero__container">
            <div class="hero__containertitle">Chez Thé Bulles</div>
            <div class="hero__containerdescription">Découvrez notre sélection de thés maison exquis.</div>
            <div class="hero__button">
                <button class="button__heroknowmore">
                    <a href="#" class="button__heroknowmoretext">En savoir plus</a>
                </button>
                <button class="button__heroordernow">
                    <a href="#" class="button__heroordernowtext">Commander maintenant</a>
                </button>
            </div>   
        </container>
        <container class="hero_imagecontainer">
            <img src="" alt="" class="hero__image">
        </container>
        <vecteur class="hero__vecteur">
            <svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1" viewBox="0 0 1440 1" fill="none">
                <path d="M0 0.5H1440" stroke="black" stroke-opacity="0.1"/>
            </svg>
        </vecteur>
    </section>

</body>
</html>
